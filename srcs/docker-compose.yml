services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    secrets:
      - db_password
      - db_root_password
      - wp_user_password
    volumes:
      - db_volume:/var/lib/mysql
    networks:
      - inception_network
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
      WP_URL: ${WP_URL}
    secrets:
      - db_password
      - db_root_password
      - wp_user_password
    volumes:
      - wp_volume:/var/www/wordpress
    networks:
      - inception_network
    depends_on:
      - mariadb
    restart: unless-stopped

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    volumes:
      - wp_volume:/var/www/wordpress
    ports:
      - "443:443"
    networks:
      - inception_network
    depends_on:
      - wordpress
    restart: unless-stopped

volumes:
  db_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/natrodri/data/db

  wp_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/natrodri/data/wordpress

networks:
  inception_network:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt